# Official statement sources -- registry (doc_class: statement)
# Single source of truth; generated into official_sources, never edit the
# table directly. See docs/context/OFFICIAL_DOCUMENTS_LAYER.md.
#
# Phase 1 pilot scope: ukraine_war_theater + iran_theater organ sets.
# Symmetry rule: every coalition carrying a narrative in narratives_v2
# gets its official organs listed.
#
# NOTE for implementation: every url below must be VERIFIED (working
# RSS endpoint or scrapeable listing) before first fetch; several are
# best-known candidates. fetch_format reflects expectation, adjust on
# verification. Some RU/IR state sites may require local fetching or
# block datacenter IPs -- verify from the actual runtime environment.

# --- Russia ---
- id: ru_kremlin_en
  source_class: statement
  name_en: President of Russia (Kremlin, EN)
  org: Presidential Executive Office, Russian Federation
  url: http://en.kremlin.ru/events/all/feed        # verify
  fetch_format: rss
  language_code: en
  actor_centroid: EUROPE-RUSSIA
  coalition: ru
  notes: Head-of-state statements, addresses, decree announcements; canonical RU position.

- id: ru_mfa_en
  source_class: statement
  name_en: Russian MFA (EN)
  org: Ministry of Foreign Affairs, Russian Federation
  url: https://mid.ru/en/press_service/             # verify; listing page, RSS availability unclear
  fetch_format: html_listing
  language_code: en
  actor_centroid: EUROPE-RUSSIA
  coalition: ru
  notes: Lavrov statements, ministry briefings; primary articulation of RU foreign-policy framing.

- id: ru_un_mission
  source_class: statement
