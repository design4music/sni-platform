- id: kerch_strait
  name_en: Kerch Strait
  name_de: Strasse von Kertsch
  category: chokepoint
  subcategory: strait
  asset_type: chokepoint
  line: [[36.45, 45.15], [36.65, 45.40]]
  commodities: [grain, oil]
  centroid_ids: [EUROPE-UKRAINE, EUROPE-RUSSIA]
  criticality: 3
  ranking_source: "Editorial (geopolitical)"
  rank_note: "Sole access to the Sea of Azov; controls Mariupol/Berdiansk grain and steel exports, contested since 2018/2022."
