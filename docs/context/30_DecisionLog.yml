  - id: D-059
    date: 2026-04-16
    type: architectural
    status: accepted
    title: Pipeline v4.0 — day-centric events, incremental clustering, instant promotion
    rationale:
      - Event families deprecated (the fuzzy-spine assembly never stabilized). Day-beat clustering produces cleaner units at the natural user-facing granularity.
      - Live pipeline redesigned around four slots (INGESTION/LABELING/CLUSTERING/ENRICHMENT) with LLM prose decoupled from clustering so the UI can show new events within minutes while prose fills in on a slower cadence.
      - Promotion (top-N clusters per day) is mechanical and instant; LLM prose only runs on promoted events.
    consequences:
      - events_v3.is_promoted gates frontend visibility (top 20/day per CTM).
      - event_families schema + family_id FK kept for compatibility but inactive; removal deferred until all months rebuilt.
      - Full design in docs/context/PIPELINE_V4_ARCHITECTURE.md.

  - id: D-060
    date: 2026-04-17
    type: frontend
    status: accepted
