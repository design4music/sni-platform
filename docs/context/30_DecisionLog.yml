  - id: D-061
    date: 2026-04-18
    type: operational
    status: accepted
    title: Full Jan/Feb/Mar reprocess under v3.0.1 + day-centric
    rationale:
      - March was caught mid-upgrade; Jan/Feb never left v2. User-facing experience on past months was broken.
      - Rebuilt from titles_v3 upward: relabel (Phase 3.1), wipe downstream, rerun Phase 3.2/3.3/4/4.5a/4.5d.
      - Labeling sharded across 3-5 parallel processes (~5× speedup via LLM concurrency).
    consequences:
      - 126K+ title_labels updated to ELO_v3.0.1 across three months.
      - All four 2026 months (Jan-Apr) now on Render with v3.0.1 labels, day-centric events, LLM prose EN+DE, and daily briefs with themes.
