decisions:

  - id: D-001
    date: 2025-11-01
    type: architectural
    status: accepted
    title: Replace Neo4j graph clustering with centroid-based architecture
    rationale:
      - Graph clustering expensive and opaque; centroids provide auditable narrative anchors
    consequences:
      - No emergent topic discovery; manual centroid curation required

  - id: D-002
    date: 2025-11-03
    type: data-model
    status: accepted
    title: Adopt CTM (Centroid-Track-Month) as atomic intelligence unit
    rationale:
      - Aligns aggregation with strategic time horizons, prevents narrative drift
    consequences:
      - CTMs become primary analysis objects; titles demoted to inputs

  - id: D-003
    date: 2025-11-05
    type: llm-usage
    status: accepted
    title: Restrict LLMs to judgment-only tasks
    rationale:
      - LLMs unreliable for structural grouping; determinism required for clustering
    scope:
      - Track assignment, event extraction, narrative summarization

  - id: D-004
    date: 2025-11-06
    type: quality-control
    status: accepted
    title: Introduce stop-word and language false-positive filtering
    rationale:
      - Prevent cultural/sport contamination and Romance-language alias collisions
    consequences:
      - Reduced false positives, cleaner systemic centroids

  - id: D-005
    date: 2025-11-07
    type: extensibility
    status: accepted
    title: Implement dynamic track configuration system
    rationale:
      - One-size-fits-all tracks reduce precision; domains need specific vocabularies
    consequences:
      - Track logic moves to database; no redeploy for track edits

  - id: D-006
    date: 2026-01-02
    type: architectural
    status: accepted
    title: Switch from sequential 3-pass early-exit to accumulative centroid matching
    rationale:
      - Sequential passes missed bilateral relationships; early-exit prevented multi-centroid assignment
    consequences:
      - 44% multi-centroid rate (vs ~5% before); pass concept obsolete; removed is_macro field

  - id: D-007
    date: 2026-01-09
    type: llm-usage
    status: accepted
    title: Implement dynamic focus lines for Phase 4.2 summary generation
    rationale:
      - Prevent forced coherence across unrelated events; enable centroid/track-specific LLM guidance
    consequences:
      - More accurate summaries; reduced hallucination of current political roles

  - id: D-008
    date: 2026-01-12
    type: operational
    status: accepted
    title: Complete Phase 4 daemon integration with monitoring
    rationale:
      - Phase 4 needed production orchestration; summary length creep is a concern
    consequences:
      - Full 4-phase pipeline operational; word count monitoring detects length bloat

  - id: D-009
    date: 2026-01-16
    type: documentation
    status: accepted
    title: Consolidate frontend documentation into CoC and Status
    rationale:
      - Frontend is a consumer layer; separate docs caused duplication and drift

  - id: D-011
    date: 2026-01-07
    type: data_model
    status: accepted
    title: Adopt many-to-many title-centroid-track relationships
    rationale:
      - Single track per title caused inconsistencies; explicit M:N preserves real-world complexity
    consequences:
      - Each title analyzed independently in each strategic context

  - id: D-012
    date: 2025-11-02
    type: filtering
    status: accepted
    title: Apply stop-word filtering only to systemic centroid matching
    rationale:
      - Culture/sports contaminated systemic matching; stop-words applied only to systemic pass

  - id: D-013
    date: 2025-11-06
    type: filtering
    status: accepted
    title: Mitigate Romance-language false positives in centroid matching
    rationale:
      - Romance-language articles ("il", "la") matched aliases; fixed by filtering + removing ambiguous codes

  - id: D-014
    date: 2025-11-04
    type: taxonomy
    status: accepted
    title: Simplify taxonomy by removing redundant aliases
    rationale:
      - Pruned 3,266 redundant aliases (22.3%) while retaining non-Latin scripts

  - id: D-015
    date: 2025-11-07
    type: classification
    status: accepted
    title: Introduce dynamic, centroid-specific track configurations
    rationale:
      - Centroid-specific track configs in DB; tailored track sets without code redeployment

  - id: D-016
    date: 2026-01-07
    type: filtering
    status: accepted
    title: Add LLM-based strategic gating before track assignment
    rationale:
      - Two-stage LLM: strategic relevance gate then track assignment; rejects marked for audit

  - id: D-017
    date: 2025-11-07
    type: orchestration
    status: accepted
    title: Use sequential pipeline execution with adaptive scheduling
    rationale:
      - Sequential matches actual bottlenecks; parallelization deferred until empirically required

  - id: D-018
    date: 2026-01-18
    type: data_model
    status: accepted
    title: Normalize events into dedicated tables (events_v3)
    rationale:
      - JSONB arrays in CTM rows made per-event updates impossible; normalized to events_v3 + event_v3_titles
    consequences:
      - Per-event LLM summaries, incremental clustering, direct frontend queries

  - id: D-019
    date: 2026-01-26
    type: architectural
    status: accepted
    title: Signal-based mechanical topic clustering (Phase 4)
    rationale:
      - Deterministic clustering via typed signals; anchors lock after 5 titles preventing drift
    consequences:
      - LLM restricted to summary generation; catchall events ensure 100% title coverage

  - id: D-020
    date: 2026-01-30
    type: architectural
    status: accepted
    title: Restructure phases -- label extraction before intel gating
    rationale:
      - Reorder to 3.1 (labels) -> 3.2 (entity backfill) -> 3.3 (gating); reduces API calls ~30%
    consequences:
      - Phase 3.3 uses label-based heuristics before calling LLM

  - id: D-021
    date: 2026-01-29
    type: operational
    status: accepted
    title: Monthly freeze process with centroid-level cross-track summaries
    rationale:
      - Prevents unbounded CTM growth; freeze generates cross-track centroid summary via LLM
    consequences:
      - Clean monthly boundaries; frozen CTMs/events immutable

  - id: D-022
    date: 2026-02-01
    type: architectural
    status: accepted
    title: Non-destructive incremental clustering (Phase 4)
    rationale:
      - Old approach deleted all events per CTM each run; incremental loads only unlinked titles
    consequences:
      - LLM summaries survive across runs; event IDs stable (bookmarkable)

  - id: D-023
    date: 2026-01-30
    type: operational
    status: accepted
    title: Local-dev / remote-demo deployment split
    rationale:
      - Local is source of truth; Render hosts read-only demo with snapshot DB
    consequences:
      - No live pipeline on remote; DB updates require manual dump/restore

  - id: D-024
    date: 2026-02-17
    type: architectural
    status: accepted
    title: Two-tier RAI signal architecture (local stats + remote interpretation)
    rationale:
      - Tier 1 computes hard stats locally (no LLM); Tier 2 sends stats for JSON interpretation
    consequences:
      - signal_stats + rai_signals JSONB per narrative; ~10-15s vs ~50-60s for full analysis

  - id: D-025
    date: 2026-02-17
    type: operational
    status: accepted
    title: Automated narrative extraction with refresh mode (Phase 5)
    rationale:
      - Daily daemon phase; CTM refresh at +100 titles, event at +50 sources
    consequences:
      - Narratives stay current; refresh deletes old frames and re-extracts

  - id: D-026
    date: 2026-02-20
    type: data_model
    status: accepted
    title: Event saga chaining across months via tag+title Dice similarity
    rationale:
      - Tag overlap + title Dice similarity (no LLM); Dice less punitive than Jaccard for unequal sets
    consequences:
      - 432 story chains linked across Jan-Feb (757 events); chains grow automatically

  - id: D-027
    date: 2026-02-20
    type: frontend
    status: accepted
    title: Media outlet profile pages
    rationale:
      - Outlet pages show geographic coverage, top CTMs, narrative frames per publisher

  - id: D-028
    date: 2026-02-21
    type: frontend
    status: accepted
    title: ISR revalidation + in-memory cache + SQL optimization
    rationale:
      - All pages used force-dynamic (2-6s loads); data changes daily so caching is safe
    consequences:
      - Pages cached 5-10 min; no Redis needed; query cache + optimized SQL for cold requests

  - id: D-029
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Add email/password authentication with NextAuth v5
    rationale:
      - Gates high-value features behind sign-in; NextAuth v5 for App Router, credential auth, JWT
    consequences:
      - Extraction and analysis API routes require session; frontend has user state

  - id: D-030
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Move narrative extraction and RAI analysis to on-demand (remove daemon Phases 5 & 6)
    rationale:
      - Phases 5/6 consumed LLM credits regardless of viewership; on-demand eliminates background spend
    consequences:
      - Daemon reduced to Phases 1-4.5b + daily purge; visitors see "Extract & Analyse" CTA

  - id: D-031
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Port RAI analysis engine locally (eliminate remote RAI intermediary)
    rationale:
      - Eliminated remote intermediary; ported to lib/rai-engine.ts (33 modules, 46 premises)
    consequences:
      - Analysis runs directly from frontend API route; DeepSeek API key needed in frontend

  - id: D-032
    date: 2026-03-01
    type: architectural
    status: accepted
    title: Materialized view pattern (mv_* tables) for expensive frontend queries
    rationale:
      - Pre-compute expensive queries (5-30s) as JSONB rows; frontend does PK lookups (<1ms)
    consequences:
      - Data staleness ~30min (was 1h); pattern extensible to any heavy analytical query

  - id: D-033
    date: 2026-03-01
    type: performance
    status: accepted
    title: Frontend query optimization pass (SARGable filters, LATERAL rewrites)
    rationale:
      - SARGable date filters, LATERAL rewrites, dropped 110ms sidebar widget
    consequences:
      - Index-backed month lookups; CTM page drops unnecessary sidebar query

  - id: D-034
    date: 2026-03-02
    type: frontend
    status: accepted
    title: German (DE) localization via next-intl with lazy content translation
    rationale:
      - Interface layer (~300 next-intl keys) + content layer (DeepSeek translation)
      - Three strategies -- pipeline-time, lazy on-demand (first DE visit + DB cache), backfill
    consequences:
      - English URLs unchanged; German adds /de/ prefix
      - First DE visit to untranslated page has ~1-2s extra latency (DeepSeek call)

  - id: D-035
    date: 2026-03-08
    type: architectural
    status: accepted
    title: Event importance scoring system (title-level + event-level)
    rationale:
      - Two-level mechanical scoring (no LLM); title 5 signals + event 5 signals -> 0.0-1.0
    consequences:
      - Threshold 0.5+ identifies top ~5%; enables merge qualification and UI elevation

  - id: D-036
    date: 2026-03-09
    type: architectural
    status: accepted
    title: Phase 4.3 cross-bucket event merging (LLM-based)
    rationale:
      - Same story fragmented across buckets (2-7 events); LLM groups and merges to anchor
    consequences:
      - Soft delete via merged_into FK (reversible); ~$0.17 for all 414 qualifying CTMs

  - id: D-037
    date: 2026-03-09
    type: performance
    status: accepted
    title: Aggressive ISR caching -- remove force-dynamic from all public pages
    rationale:
      - All 23 pages force-dynamic (10-30s queries); content updates daily so 1h cache safe
    consequences:
      - revalidate=3600 data / 86400 static; subsequent visitors get cached HTML (<100ms)

  - id: D-038
    date: 2026-03-10
    type: architectural
    status: accepted
    title: Stance-clustered narratives replace LLM-generated narrative frames
    rationale:
      - Old approach: LLM invented narrative frames from headlines (hallucination-prone, unstable across runs)
      - New approach: group publishers by their stance scores (critical < -0.5, reportorial, supportive > 0.5), sample headlines per cluster, LLM only names the dominant frame within each real editorial grouping
      - Narratives now grounded in observable publisher behavior, not LLM imagination
    consequences:
      - 1-3 narratives per entity (was unbounded); extraction_method = 'stance_clustered'
      - Extraction moved to on-demand (D-030); old framed narratives retained read-only

  - id: D-039
    date: 2026-03-12
    type: architectural
    status: accepted
    title: Comparative cross-cluster analysis (entity_analyses)
    rationale:
      - Per-narrative analysis missed the inter-cluster picture; comparative analysis reads ALL stance clusters together and produces one integrated brief covering convergence, divergence, omissions, and collective blind spots
      - Analysis stored per entity (entity_type + entity_id) not per narrative
    consequences:
      - entity_analyses table (sections JSONB, synthesis, blind_spots, conflicts)
      - Frontend page at /analysis/comparative/[entity_type]/[entity_id]
      - Supports regeneration (force flag) and DE translation

  - id: D-040
    date: 2026-03-12
    type: analytical
    status: accepted
    title: Centroid timeline as temporal context for analysis (90-day window)
    rationale:
      - Analysis without history misses escalation patterns and recurring themes
      - Feed the LLM the top ~10 most important events from the same centroid within 90 days BEFORE the analyzed event (never after, to prevent future-leak)
      - Events ranked by importance_score + tag overlap with analyzed event
    consequences:
      - Timeline block injected into comparative prompt; analyst can trace escalation arcs
      - getCentroidTimeline query with tag-boost scoring and beforeDate anchor

  - id: D-041
    date: 2026-03-14
    type: architectural
    status: accepted
    title: Label-based deterministic module selection for RAI analysis
    rationale:
      - Old approach used LLM to pick which analysis modules to apply (slow, non-deterministic)
      - New approach: selectModulesByLabels() maps event labels to modules mechanically
      - 16 consolidated modules in rai-engine.ts, command-format prompts
    consequences:
      - No LLM call for module selection; analysis prompt assembled deterministically
      - Modules cover: actor mapping, omission detection, framing devices, historical context, etc.

  - id: D-042
    date: 2026-03-14
    type: operational
    status: accepted
    title: Token-conscious prompt engineering as ongoing practice
    rationale:
      - Triggered by bloated comparative analysis prompt (~18K tokens across prompts + context docs)
      - Audit found ~43% reduction possible without meaning loss: tables over prose, deduplicated rules, deleted dead code (PREMISE_LIBRARY ~330 lines), consolidated 4 PROSE_RULES blocks into 1
      - Every token in a prompt is paid per-call across thousands of invocations; small savings compound
    consequences:
      - All new prompts must follow: no filler openers ("You are a helpful..."), imperative voice, say each rule once, tables for structured data, bullets for constraints
      - Shared prompt fragments extracted to core/prompts.py (PROSE_RULES, MERGE prompts, COHERENCE_CHECK)
      - Context docs trimmed: PIPELINE_STATUS 1135->256 lines, DecisionLog 789->347, ProjectModel 260->210
