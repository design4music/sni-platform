  - id: D-065
    date: 2026-04-20
    type: architectural
    status: accepted
    title: Centroid period summaries — new centroid_summaries table replaces legacy centroid_monthly_summaries
    rationale:
      - The old centroid_monthly_summaries table stored a single
        markdown paragraph per centroid/month derived from per-CTM
        summary_text. It lacked per-track structure, had no DE, no
        rolling window, and its LLM prompt was wordy + echo-prone
        (DeepSeek hallucinated stale role titles like "former
        president"; the event-ID feed format leaked bracketed IDs
        into prose).
      - The new centroid_summaries table stores tier-0 overall
        (EN+DE) + per-track JSONB ({state_en, state_de,
        supporting_events}). Supports two period_kinds — rolling_30d
        (daemon) and monthly (freeze). Three tiers: FULL (LLM full),
        LIGHT (overall only), CANNED (static, no LLM).
      - Ambient context passed to the prompt (top persons/orgs/
        countries/places, filtered for ubiquity) gives the LLM
        actors beyond the head of government; role-label rules ban
        anything not verbatim in event titles.
      - Event input format changed from "[id] N src | date | title"
        to "N src | date | title | id=xxxxxxxx" — removes the
        visual cue that was teaching the model to bracket IDs.
    consequences:
      - New pipeline/phase_5/generate_centroid_summary.py with
        bilingual single-shot generation. scripts/
        backfill_centroid_summaries.py filled Jan–Apr 2026
        (298 monthly rows, ~80/13/6% tier split).
      - Freeze (pipeline/freeze/freeze_month.py) Step 3 now calls
        the new module with period_kind='monthly' for every
        centroid active in the month; legacy helpers (including
        CENTROID_SUMMARY_SYSTEM_PROMPT) deleted.
      - Daemon gains Phase 5.5-rolling in Slot 4: refreshes
        rolling_30d rows for centroids with promoted events in the
        last 30 days, staleness-gated (24h default), budget-capped
        (100/run default).
      - Frontend centroid page replaces the "monthlyOverview" block
        with a tier-0 "Overview" briefing; TrackCards render the
        per-track state paragraph from the new table. Legacy
        ctm.summary_text fallback removed from centroid page (still
        used by /c/*/t/* calendar page and narratives/social/RAI
        consumers — retirement deferred to a follow-up ticket).
      - Migration 20260420_drop_centroid_monthly_summaries.sql
        drops the legacy table; applied local + Render.
      - Docs updated (PIPELINE_V4_ARCHITECTURE.md gets Phase 5.5
        entry; PIPELINE_STATUS.md reflects new enrichment slot +
        data architecture layer).

  - id: D-066
    date: 2026-04-22
    type: frontend
    status: accepted
    title: SEO overhaul — unique metadata, hreflang, sitemap, JSON-LD; calendar route merged into track page
    rationale:
      - Pre-work the site had templated boilerplate titles/descriptions,
        a thin sitemap (only centroids + tracks), no hreflang, no
        per-page OpenGraph/Twitter, and no structured data. Not
        indexable at the quality needed for SEO to drive traffic.
      - The /c/*/t/*/calendar sub-route was redundant: when a CTM has
        promoted data the old /c/*/t/* page redirected to /calendar
        anyway. Consolidating reduces two URLs to one, simplifies
        canonical logic, and removes ~1k lines of legacy v3
        story-groups code.
    consequences:
      - New lib/seo.ts helpers (buildPageMetadata, buildAlternates,
        formatMonthLabel, truncateDescription, humanizeEnum, joinList,
        formatCount) + new components/JsonLd.tsx. Shared across all
        metadata-emitting pages.
      - Unique titles + descriptions on centroid / track (calendar)
        / event pages. Centroid + track descriptions prefer the D-065
        editorial overview when present, fall back to mechanical
        stats (event count, source count, top themes).
      - Hreflang (en / de / x-default) on all 22 metadata-producing
        pages.
      - Sitemap rewritten: single /sitemap.xml covers static + regions
        + centroids + tracks + narratives + epics + sources + signal
        categories + promoted events (last 180 days, >=5 sources),
        capped at 48k URLs. Each entry carries hreflang alternates.
        Revalidate daily.
      - JSON-LD: NewsArticle + BreadcrumbList on /events/[id]; Article
        + BreadcrumbList on /narratives/[id] + /epics/[slug];
        BreadcrumbList on /c/[id] + /c/[id]/t/[track]; SearchAction
        added to the root WebSite block.
      - OpenGraph + Twitter per-page overrides on the core dynamic
        pages.
      - noindex on /auth, /profile, /search, /analysis/user,
        /analysis/comparative.
      - /c/*/t/*/calendar folded into /c/*/t/*. 301 redirect in
        next.config.js for prior backlinks. Legacy v3 story-groups
        code + three orphan components (IranWarSwimlane,
        StoryGroupList, MobileTocButton) + queries.ctmHasPromotedData
        deleted. force-dynamic dropped on centroid + calendar pages
        (revalidate=1800); kept on track + event (ensureDE).
      - Fix in next-intl middleware matcher: exclude any path with a
        dot (.*\\..*), so /sitemap.xml + /robots.txt + future
        opengraph-image.png don't get 404'd as locale routes.

  - id: D-067
    date: 2026-04-22
    type: pipeline
    status: accepted
    title: Narrative-matching domain mapping consolidated to live tracks
    rationale:
      - ctm.track has four live values (geo_security, geo_politics,
        geo_economy, geo_society). Historical v3-era tracks
        (geo_humanitarian, geo_information, geo_energy) were defined
        in old taxonomy but never written by the v3+ pipeline.
      - pipeline/phase_4/match_narratives.py DOMAIN_TO_TRACK mapped
        ENERGY / HUMANITARIAN / INFORMATION / MEDIA at those dead
        track names. The ctm_structural_match SQL filtered
        c.track = ANY(track_list), so any narrative whose only
        domain landed there matched zero events. Audit showed only
        8 of 260 narratives were actually affected (the rest had
        at least one live-mapped domain), so the impact was
        correctness-not-catastrophic — but worth fixing.
      - A legacy mismapping (SOCIETY → geo_politics, from before
        geo_society existed as a track) was fixed in the same pass.
    consequences:
      - DOMAIN_TO_TRACK now consolidates: ENERGY → geo_economy,
        INFORMATION / MEDIA → geo_politics,
        HUMANITARIAN → geo_society, SOCIETY → geo_society.
      - Dead-track references purged from 4 frontend files
        (SourceCountryAccordion, sources/[feed_name] page,
        messages/en.json + de.json track namespace) and 1 pipeline
        file (social_posting._TRACK_DISPLAY). energy_conflict (also
        dead) cleaned alongside.
      - Audit-checked DB state on local + Render confirmed only 4
        live track values in ctm.
      - Not touched (flagged): pipeline/phase_4/run_france_all.py
        (frozen one-shot prototype), track_configs table (60-entry
        granular vocabulary with one unused frontend consumer).

