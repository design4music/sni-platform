  - id: D-062
    date: 2026-04-20
    type: performance
    status: accepted
    title: Phase 3.3 (mechanical track assignment) rewritten as bulk SQL
    rationale:
      - Existing per-title Python loop ran at ~100 titles/sec and became a bottleneck during backfills.
      - Entire operation (NON_STRATEGIC gating, CTM creation, assignment insertion, title_count recompute) expressible as four SQL statements with temp table snapshot.
      - Existing unique constraints enable native ON CONFLICT handling.
    consequences:
      - ~450x faster backfill (6,191 titles in 4s vs 30+ min); ~30x under live load.
      - Daemon contract unchanged (process_batch signature preserved).
      - Fixes a pre-existing drift bug: original code incremented ctm.title_count on every INSERT attempt including ON CONFLICT DO NOTHING. Exact recount in step 4 prevents drift going forward. April still shows ~265 drifted CTMs from pre-rewrite accumulation — pending one-time correction.

