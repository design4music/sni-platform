decisions:

  - id: D-001
    date: 2025-11-01
    type: architectural
    status: accepted
    title: Replace Neo4j graph clustering with centroid-based architecture
    rationale:
      - Graph clustering expensive and opaque; centroids provide auditable narrative anchors
    consequences:
      - No emergent topic discovery; manual centroid curation required

  - id: D-002
    date: 2025-11-03
    type: data-model
    status: accepted
    title: Adopt CTM (Centroid-Track-Month) as atomic intelligence unit
    rationale:
      - Aligns aggregation with strategic time horizons, prevents narrative drift
    consequences:
      - CTMs become primary analysis objects; titles demoted to inputs

  - id: D-003
    date: 2025-11-05
    type: llm-usage
    status: accepted
    title: Restrict LLMs to judgment-only tasks
    rationale:
      - LLMs unreliable for structural grouping; determinism required for clustering
    scope:
      - Track assignment, event extraction, narrative summarization

  - id: D-004
    date: 2025-11-06
    type: quality-control
    status: accepted
    title: Introduce stop-word and language false-positive filtering
    rationale:
      - Prevent cultural/sport contamination and Romance-language alias collisions
    consequences:
      - Reduced false positives, cleaner systemic centroids

  - id: D-005
    date: 2025-11-07
    type: extensibility
    status: accepted
    title: Implement dynamic track configuration system
    rationale:
      - One-size-fits-all tracks reduce precision; domains need specific vocabularies
    consequences:
      - Track logic moves to database; no redeploy for track edits

  - id: D-006
    date: 2026-01-02
    type: architectural
    status: accepted
    title: Switch from sequential 3-pass early-exit to accumulative centroid matching
    rationale:
      - Sequential passes missed bilateral relationships; early-exit prevented multi-centroid assignment
    consequences:
      - 44% multi-centroid rate (vs ~5% before); pass concept obsolete; removed is_macro field

  - id: D-007
    date: 2026-01-09
    type: llm-usage
    status: accepted
    title: Implement dynamic focus lines for Phase 4.2 summary generation
    rationale:
      - Prevent forced coherence across unrelated events; enable centroid/track-specific LLM guidance
    consequences:
      - More accurate summaries; reduced hallucination of current political roles

  - id: D-008
    date: 2026-01-12
    type: operational
    status: accepted
    title: Complete Phase 4 daemon integration with monitoring
    rationale:
      - Phase 4 needed production orchestration; summary length creep is a concern
    consequences:
      - Full 4-phase pipeline operational; word count monitoring detects length bloat

  - id: D-009
    date: 2026-01-16
    type: documentation
    status: accepted
    title: Consolidate frontend documentation into CoC and Status
    rationale:
      - Frontend is a consumer layer; separate docs caused duplication and drift

  - id: D-011
    date: 2026-01-07
    type: data_model
    status: accepted
    title: Adopt many-to-many title-centroid-track relationships
    rationale:
      - Single track per title caused inconsistencies; explicit M:N preserves real-world complexity
    consequences:
      - Each title analyzed independently in each strategic context

  - id: D-012
    date: 2025-11-02
    type: filtering
    status: accepted
    title: Apply stop-word filtering only to systemic centroid matching
    rationale:
      - Culture/sports contaminated systemic matching; stop-words applied only to systemic pass

  - id: D-013
    date: 2025-11-06
    type: filtering
    status: accepted
    title: Mitigate Romance-language false positives in centroid matching
    rationale:
      - Romance-language articles ("il", "la") matched aliases; fixed by filtering + removing ambiguous codes

  - id: D-014
    date: 2025-11-04
    type: taxonomy
    status: accepted
    title: Simplify taxonomy by removing redundant aliases
    rationale:
      - Pruned 3,266 redundant aliases (22.3%) while retaining non-Latin scripts

  - id: D-015
    date: 2025-11-07
    type: classification
    status: accepted
    title: Introduce dynamic, centroid-specific track configurations
    rationale:
      - Centroid-specific track configs in DB; tailored track sets without code redeployment

  - id: D-016
    date: 2026-01-07
    type: filtering
    status: accepted
    title: Add LLM-based strategic gating before track assignment
    rationale:
      - Two-stage LLM: strategic relevance gate then track assignment; rejects marked for audit

  - id: D-017
    date: 2025-11-07
    type: orchestration
    status: accepted
    title: Use sequential pipeline execution with adaptive scheduling
    rationale:
      - Sequential matches actual bottlenecks; parallelization deferred until empirically required

  - id: D-018
    date: 2026-01-18
    type: data_model
    status: accepted
    title: Normalize events into dedicated tables (events_v3)
    rationale:
      - JSONB arrays in CTM rows made per-event updates impossible; normalized to events_v3 + event_v3_titles
    consequences:
      - Per-event LLM summaries, incremental clustering, direct frontend queries

  - id: D-019
    date: 2026-01-26
    type: architectural
    status: accepted
    title: Signal-based mechanical topic clustering (Phase 4)
    rationale:
      - Deterministic clustering via typed signals; anchors lock after 5 titles preventing drift
    consequences:
      - LLM restricted to summary generation; catchall events ensure 100% title coverage

  - id: D-020
    date: 2026-01-30
    type: architectural
    status: accepted
    title: Restructure phases -- label extraction before intel gating
    rationale:
      - Reorder to 3.1 (labels) -> 3.2 (entity backfill) -> 3.3 (gating); reduces API calls ~30%
    consequences:
      - Phase 3.3 uses label-based heuristics before calling LLM

  - id: D-021
    date: 2026-01-29
    type: operational
    status: accepted
    title: Monthly freeze process with centroid-level cross-track summaries
    rationale:
      - Prevents unbounded CTM growth; freeze generates cross-track centroid summary via LLM
    consequences:
      - Clean monthly boundaries; frozen CTMs/events immutable

  - id: D-022
    date: 2026-02-01
    type: architectural
    status: accepted
    title: Non-destructive incremental clustering (Phase 4)
    rationale:
      - Old approach deleted all events per CTM each run; incremental loads only unlinked titles
    consequences:
      - LLM summaries survive across runs; event IDs stable (bookmarkable)

  - id: D-023
    date: 2026-01-30
    type: operational
    status: accepted
    title: Local-dev / remote-demo deployment split
    rationale:
      - Local is source of truth; Render hosts read-only demo with snapshot DB
    consequences:
      - No live pipeline on remote; DB updates require manual dump/restore

  - id: D-024
    date: 2026-02-17
    type: architectural
    status: accepted
    title: Two-tier RAI signal architecture (local stats + remote interpretation)
    rationale:
      - Tier 1 computes hard stats locally (no LLM); Tier 2 sends stats for JSON interpretation
    consequences:
      - signal_stats + rai_signals JSONB per narrative; ~10-15s vs ~50-60s for full analysis

  - id: D-025
    date: 2026-02-17
    type: operational
    status: accepted
    title: Automated narrative extraction with refresh mode (Phase 5)
    rationale:
      - Daily daemon phase; CTM refresh at +100 titles, event at +50 sources
    consequences:
      - Narratives stay current; refresh deletes old frames and re-extracts

  - id: D-026
    date: 2026-02-20
    type: data_model
    status: accepted
    title: Event saga chaining across months via tag+title Dice similarity
    rationale:
      - Tag overlap + title Dice similarity (no LLM); Dice less punitive than Jaccard for unequal sets
    consequences:
      - 432 story chains linked across Jan-Feb (757 events); chains grow automatically

  - id: D-027
    date: 2026-02-20
    type: frontend
    status: accepted
    title: Media outlet profile pages
    rationale:
      - Outlet pages show geographic coverage, top CTMs, narrative frames per publisher

  - id: D-028
    date: 2026-02-21
    type: frontend
    status: accepted
    title: ISR revalidation + in-memory cache + SQL optimization
    rationale:
      - All pages used force-dynamic (2-6s loads); data changes daily so caching is safe
    consequences:
      - Pages cached 5-10 min; no Redis needed; query cache + optimized SQL for cold requests

  - id: D-029
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Add email/password authentication with NextAuth v5
    rationale:
      - Gates high-value features behind sign-in; NextAuth v5 for App Router, credential auth, JWT
    consequences:
      - Extraction and analysis API routes require session; frontend has user state

  - id: D-030
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Move narrative extraction and RAI analysis to on-demand (remove daemon Phases 5 & 6)
    rationale:
      - Phases 5/6 consumed LLM credits regardless of viewership; on-demand eliminates background spend
    consequences:
      - Daemon reduced to Phases 1-4.5b + daily purge; visitors see "Extract & Analyse" CTA

  - id: D-031
    date: 2026-02-21
    type: architectural
    status: accepted
    title: Port RAI analysis engine locally (eliminate remote RAI intermediary)
    rationale:
      - Eliminated remote intermediary; ported to lib/rai-engine.ts (33 modules, 46 premises)
    consequences:
      - Analysis runs directly from frontend API route; DeepSeek API key needed in frontend

  - id: D-032
    date: 2026-03-01
    type: architectural
    status: accepted
    title: Materialized view pattern (mv_* tables) for expensive frontend queries
    rationale:
      - Pre-compute expensive queries (5-30s) as JSONB rows; frontend does PK lookups (<1ms)
    consequences:
      - Data staleness ~30min (was 1h); pattern extensible to any heavy analytical query

  - id: D-033
    date: 2026-03-01
    type: performance
    status: accepted
    title: Frontend query optimization pass (SARGable filters, LATERAL rewrites)
    rationale:
      - SARGable date filters, LATERAL rewrites, dropped 110ms sidebar widget
    consequences:
      - Index-backed month lookups; CTM page drops unnecessary sidebar query

  - id: D-034
    date: 2026-03-02
    type: frontend
    status: accepted
    title: German (DE) localization via next-intl with lazy content translation
    rationale:
      - Interface layer (~300 next-intl keys) + content layer (DeepSeek translation)
      - Three strategies -- pipeline-time, lazy on-demand (first DE visit + DB cache), backfill
    consequences:
      - English URLs unchanged; German adds /de/ prefix
      - First DE visit to untranslated page has ~1-2s extra latency (DeepSeek call)

  - id: D-035
    date: 2026-03-08
    type: architectural
    status: accepted
    title: Event importance scoring system (title-level + event-level)
    rationale:
      - Two-level mechanical scoring (no LLM); title 5 signals + event 5 signals -> 0.0-1.0
    consequences:
      - Threshold 0.5+ identifies top ~5%; enables merge qualification and UI elevation

  - id: D-036
    date: 2026-03-09
    type: architectural
    status: accepted
    title: Phase 4.3 cross-bucket event merging (LLM-based)
    rationale:
      - Same story fragmented across buckets (2-7 events); LLM groups and merges to anchor
    consequences:
      - Soft delete via merged_into FK (reversible); ~$0.17 for all 414 qualifying CTMs

  - id: D-037
    date: 2026-03-09
    type: performance
    status: accepted
    title: Aggressive ISR caching -- remove force-dynamic from all public pages
    rationale:
      - All 23 pages force-dynamic (10-30s queries); content updates daily so 1h cache safe
    consequences:
      - revalidate=3600 data / 86400 static; subsequent visitors get cached HTML (<100ms)

  - id: D-038
    date: 2026-03-10
    type: architectural
    status: accepted
    title: Stance-clustered narratives replace LLM-generated narrative frames
    rationale:
      - Old approach: LLM invented narrative frames from headlines (hallucination-prone, unstable across runs)
      - New approach: group publishers by their stance scores (critical < -0.5, reportorial, supportive > 0.5), sample headlines per cluster, LLM only names the dominant frame within each real editorial grouping
      - Narratives now grounded in observable publisher behavior, not LLM imagination
    consequences:
      - 1-3 narratives per entity (was unbounded); extraction_method = 'stance_clustered'
      - Extraction moved to on-demand (D-030); old framed narratives retained read-only

  - id: D-039
    date: 2026-03-12
    type: architectural
    status: accepted
    title: Comparative cross-cluster analysis (entity_analyses)
    rationale:
      - Per-narrative analysis missed the inter-cluster picture; comparative analysis reads ALL stance clusters together and produces one integrated brief covering convergence, divergence, omissions, and collective blind spots
      - Analysis stored per entity (entity_type + entity_id) not per narrative
    consequences:
      - entity_analyses table (sections JSONB, synthesis, blind_spots, conflicts)
      - Frontend page at /analysis/comparative/[entity_type]/[entity_id]
      - Supports regeneration (force flag) and DE translation

  - id: D-040
    date: 2026-03-12
    type: analytical
    status: accepted
    title: Centroid timeline as temporal context for analysis (90-day window)
    rationale:
      - Analysis without history misses escalation patterns and recurring themes
      - Feed the LLM the top ~10 most important events from the same centroid within 90 days BEFORE the analyzed event (never after, to prevent future-leak)
      - Events ranked by importance_score + tag overlap with analyzed event
    consequences:
      - Timeline block injected into comparative prompt; analyst can trace escalation arcs
      - getCentroidTimeline query with tag-boost scoring and beforeDate anchor

  - id: D-041
    date: 2026-03-14
    type: architectural
    status: accepted
    title: Label-based deterministic module selection for RAI analysis
    rationale:
      - Old approach used LLM to pick which analysis modules to apply (slow, non-deterministic)
      - New approach: selectModulesByLabels() maps event labels to modules mechanically
      - 16 consolidated modules in rai-engine.ts, command-format prompts
    consequences:
      - No LLM call for module selection; analysis prompt assembled deterministically
      - Modules cover: actor mapping, omission detection, framing devices, historical context, etc.

  - id: D-042
    date: 2026-03-14
    type: operational
    status: accepted
    title: Token-conscious prompt engineering as ongoing practice
    rationale:
      - Triggered by bloated comparative analysis prompt (~18K tokens across prompts + context docs)
      - Audit found ~43% reduction possible without meaning loss: tables over prose, deduplicated rules, deleted dead code (PREMISE_LIBRARY ~330 lines), consolidated 4 PROSE_RULES blocks into 1
      - Every token in a prompt is paid per-call across thousands of invocations; small savings compound
    consequences:
      - All new prompts must follow: no filler openers ("You are a helpful..."), imperative voice, say each rule once, tables for structured data, bullets for constraints
      - Shared prompt fragments extracted to core/prompts.py (PROSE_RULES, MERGE prompts, COHERENCE_CHECK)
      - Context docs trimmed: PIPELINE_STATUS 1135->256 lines, DecisionLog 789->347, ProjectModel 260->210

  - id: D-043
    date: 2026-03-16
    type: frontend
    status: accepted
    title: Social OAuth (Google, LinkedIn) + Facebook dropped
    rationale:
      - Google OAuth verified and public; LinkedIn live without verification
      - Facebook developer console unreliable (App Domains won't save, callback errors); dropped
    consequences:
      - NextAuth v5 uses AUTH_URL + AUTH_SECRET (not NEXTAUTH_URL/NEXTAUTH_SECRET)
      - Data deletion page removed; Facebook provider removed from auth.ts

  - id: D-044
    date: 2026-03-16
    type: frontend
    status: accepted
    title: User RAI Analyst with dedicated report pages
    rationale:
      - Profile-based free-text RAI analysis; inline accordion replaced with dedicated pages
      - Reuses ComparativeContent for full markdown rendering (bold, lists, blockquotes)
    consequences:
      - /analysis/user/[id] pages; analysis history on profile links out instead of expanding inline
      - Standalone RAI app (rai-companion) ready to archive

  - id: D-045
    date: 2026-03-18
    type: architectural
    status: accepted
    title: Strategic narrative mapping system (meta-narratives, strategic narratives, event matching)
    rationale:
      - 260 strategic narratives (actor-bound geopolitical claims) organized under 9 meta-narratives
      - Two-tier taxonomy -- operational (concrete actions) vs ideological (worldview/values)
      - Mechanical matching (CTM structural + label-based) handles operational tier
      - LLM matching handles ideological tier (narrative-centric, one call per narrative)
      - LLM review prunes false positives from mechanical matches
      - Manual curation of aligned_with/opposes for narrative clustering
    consequences:
      - New tables: meta_narratives, strategic_narratives, event_strategic_narratives, narrative_weekly_activity
      - strategic_narratives enriched with: tier, matching_guidance, aligned_with, opposes, example_event_ids
      - Phase 4.2f (mechanical) + 4.2g (LLM discovery) + 4.2h (LLM review) in matching pipeline
      - Frontend: /narratives landscape, /narratives/[id] detail, /narratives/meta/[id]
      - Narrative integration on centroid pages, event pages, trending cards, epic sidebar, comparative analysis
      - Event-level "narrative frames" renamed to "media framing" to avoid term overload

  - id: D-046
    date: 2026-03-18
    type: terminology
    status: accepted
    title: Reserve "narrative" for strategic/meta level; event-level extraction renamed "media framing"
    rationale:
      - "Narrative" was overloaded -- strategic geopolitical claims vs event-level stance clustering
      - Users confused by seeing "Narrative Analysis" (media framing) alongside "Strategic Narratives" (geopolitical)
    consequences:
      - All event/CTM-level UI labels changed from "Narrative Frames" to "Media Framing"
      - i18n keys updated in en.json and de.json across event, track, source, extract namespaces

  - id: D-047
    date: 2026-03-24
    type: architectural
    status: experimental
    title: Top-down sector-based clustering with expanded label taxonomy
    rationale:
      - Iran war spike exposed fragility in bottom-up incremental clustering (mega-events with 2K+ titles)
      - Root cause was clustering on raw signal overlap with no semantic grouping layer
      - New approach groups by sector+subject first (semantic gate), then splits by identity signals (Louvain)
      - Phase 3.1 taxonomy expanded -- subject now required, 6 new subjects added (BILATERAL_RELATIONS, SUMMIT, DEFENSE_POLICY, LAW_ENFORCEMENT, R_AND_D, PROTEST)
      - NON_STRATEGIC sector filters garbage mechanically (sports, entertainment, celebrity)
    consequences:
      - France/March test: 1104 strategic titles -> 80 topics, 3% catchall (was 37% with old approach)
      - Sector coverage 100%, subject coverage 100% (was 89%)
      - Topics are broader thematic vectors, not individual events
      - Mechanical merge pass + targeted LLM merge pass still needed for fragmented topics
      - Test harness: pipeline/phase_4/rebuild_centroid.py (standalone, does not replace production pipeline)
      - Branch: feat/sector-clustering

  - id: D-048
    date: 2026-03-24
    type: taxonomy
    status: accepted
    title: Expand sector/subject controlled vocabulary with 6 new subjects
    rationale:
      - 159 strategic titles had NULL subject (14%), mostly in DIPLOMACY (64 NULL) and MILITARY (19 NULL)
      - Existing subjects missed common patterns -- diplomatic pressure, defense posture, law enforcement, tech R&D, protests
      - Subject now required in prompt (was optional); LLM instructed to always pick closest match
    consequences:
      - New subjects: DIPLOMACY/BILATERAL_RELATIONS, DIPLOMACY/SUMMIT, MILITARY/DEFENSE_POLICY, SECURITY/LAW_ENFORCEMENT, TECHNOLOGY/R_AND_D, SOCIETY/PROTEST
      - Subject fill rate 89% -> 100% for France/March after re-extraction
      - BILATERAL_RELATIONS absorbed 51 of 64 DIPLOMACY/NULL titles (biggest gap)

  - id: D-049
    date: 2026-03-28
    type: architectural
    status: accepted
    title: Faceted clustering replaces Louvain community detection
    rationale:
      - Louvain produced false merges at scale (Iraq+Congo via shared PER:MACRON)
      - Faceted approach uses hard partitions on anchor signals -- titles with different anchors never merge
      - Word-containment signal normalization replaces cosine similarity for places/persons
    consequences:
      - core/signal_normalization.py replaces core/signal_aliases.py
      - prototype_faceted.py is the reference implementation
      - Dynamic ubiquitous filtering (no hardcoded stop words)

  - id: D-050
    date: 2026-03-31
    type: architectural
    status: accepted
    title: Layered clustering -- mechanical Layer 1 + LLM Layer 2
    rationale:
      - Mechanical clustering (faceted) produces clean signal units but too many fragments
      - LLM reads headlines and groups into stories -- catches what signals miss
      - Layer 1 (mechanical) handles 47% of titles for free; Layer 2 (LLM) handles remainder at ~$1/CTM-month
    consequences:
      - prototype_layered.py is the reference implementation
      - Layer 1 clusters = events_v3 (building blocks, not user-facing)
      - Phase 3.3 (LLM intel gating + track assignment) can be replaced by mechanical sector filter

  - id: D-051
    date: 2026-04-01
    type: architectural
    status: accepted
    title: Event families as Layer 2 narrative topics
    rationale:
      - Clusters are building blocks, not the product
      - Event families = user-facing stories assembled by LLM from clusters
      - One LLM call per CTM batches all clusters, returns 30-60 narrative topics
      - Each family gets structured summary, domain label, timeline
    consequences:
      - New table event_families (title, summary, domain, cluster_count, source_count, dates)
      - events_v3.family_id links clusters to families
      - Frontend shows families (Layer 2), not individual clusters (Layer 1)

  - id: D-052
    date: 2026-04-01
    type: vision
    status: planned
    title: Friction nodes -- auto-detected geopolitical conflict zones
    rationale:
      - Global news orbits handful of active friction points (Iran war, US-Russia, US-China)
      - Friction node = cross-centroid correlation of strategic narratives on shared timeline
      - Detected from narrative co-occurrence across 5+ centroids
    consequences:
      - Replaces current Signals and Epics as high-level picture
      - Persistent across months (friction node has chapters per month)
      - See docs/context/FRICTION_NODES_VISION.md

  - id: D-053
    date: 2026-04-10
    type: architectural
    status: accepted
    title: Mechanical spine-based family assembly replaces LLM family assembly
    rationale:
      - LLM family assembly (D-051) validated on 3 tiers but mechanical approach proved superior
      - Spine detection from title_labels (place > person > org > subject, track-aware) produces deterministic, reproducible families
      - Tested on full March corpus (USA Security, France Security, Baltic States)
      - Zero LLM cost for family assembly step; LLM reserved for title/summary polish only
      - Script build_families_mechanical.py validated; needs extraction into pipeline module
    consequences:
      - D-051 superseded -- LLM family assembly archived (EVENT_FAMILY_ASSEMBLY.md -> archive/)
      - Pipeline becomes: Phase 4 (clustering) -> 4.1 (family assembly, mechanical) -> 4.2 (within-family merge) -> 4.5a (titles/summaries) -> 4.5b (CTM digests)
      - event_families table gains spine_type, spine_value columns
      - Family assembly must support incremental operation (daily new titles)

  - id: D-054
    date: 2026-04-11
    type: architectural
    status: rejected
    title: Global clustering (no bucket partitioning) with all label signals
    rationale:
      - Hypothesis: removing bucket boundaries and using all title_labels (actor, target, action_class, subject, sector + entity signals) would eliminate cross-bucket duplicates
      - Prototype tested on 3 CTMs (USA/politics, China/economy, France/politics)
      - Catchall rate dropped from 35-68% to 1-4% (major improvement in coverage)
      - But cluster quality degraded significantly -- broad structural labels (target=CN + action_class=INFRASTRUCTURE_DEVELOPMENT) created mega-clusters absorbing unrelated stories
      - Bucket boundaries provide essential precision by limiting the comparison pool
      - Without buckets, generic label combinations act as attractors that pull in everything
    consequences:
      - Keep bucket-based clustering (Phase 4) as-is
      - Cross-bucket duplicates to be handled downstream (family assembly or post-clustering merge)
      - Key insight preserved: Phase 4 should use all title_labels (actor, target, subject, action_class) WITHIN buckets -- currently only uses entity signals (persons, orgs, places etc)
      - Prototype archived: scripts/prototype_global_clustering.py

  - id: D-055
    date: 2026-04-12
    type: architectural
    status: accepted
    title: Beats - temporal event extraction replaces clustering as the primary user-facing event surface
    rationale:
      - Clustering and family assembly produce themes (similarity bags smeared across time), not events (dated story-beats)
      - The user-facing product is a dated narrative, not a thematic grouping
      - Diagnostic on USA/security/March found the real event granularity at (actor, action_class, target) x date x top-entity -- one level below the cluster layer
      - Ground-truth structural labels from Phase 3.1 carry the signal; clustering discards it
      - Prototype (scripts/prototype_whale_extraction.py) validated on three CTMs of different shape, volume, and domain:
        - USA/geo_security/March (7700 titles, mega-conflict) -> 143 events in 6 theaters reading as a daily brief
        - ASIA-CHINA/geo_economy/March (1200 titles, abstract domain with sparse labels) -> 13 events caught the month's real stories (NPC Two Sessions, Apple App Store, Paris trade talks, MOFCOM pushback)
        - EUROPE-BALTIC/geo_security/March (142 titles, small CTM) -> 4 clean events including a new discovery (Lithuania Ukraine-drone crash)
      - Algorithm is fully mechanical, no LLM in the extraction loop
      - Degrades gracefully on small CTMs (Mode B flat list below 15 events) and scales on mega-conflicts (Mode A theater grouping)
    consequences:
      - Beats becomes a new Phase 4.6 module consuming title_labels directly
      - Clustering (Phase 4) and family assembly (Phase 4.1) survive as structural infrastructure and secondary lens but no longer drive the user-facing event surface
      - New table beats_events to store (ctm_id, beat, date, entity, headline, theater, spike_ratio, sources) -- schema TBD
      - Frontend needs Beats view with Mode A (theater timelines) and Mode B (flat list) rendering
      - Taxonomy revision required: sparse entity labels in economic/abstract domains are the biggest quality limiter (sectors[], products[], technologies[] fields needed; action_class refinements)
      - Ubiquity filter from D-049 adopted at event-naming layer (12% of CTM titles)
      - Theater classification is per-centroid config (THEATER_RULES in code for now; candidate for centroid-level DB field later)
      - Full direction documented in docs/context/BEATS_DIRECTION.md
