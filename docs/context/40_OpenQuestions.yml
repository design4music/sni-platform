questions:

  - id: Q-001
    date: 2026-02-21
    status: open
    title: Stale narratives after removing daemon auto-refresh
    context: >
      The daemon previously re-extracted narratives when entities grew significantly
      (CTMs +100 titles, events +50 sources). With Phase 5 removed from the daemon
      (D-030), narratives extracted early in a month will become stale as coverage
      accumulates. A CTM extracted at 120 titles may have 400 by month-end.
    possible_directions:
      - Refresh button on the analysis page (user-triggered re-extraction)
      - Staleness indicator showing growth since extraction (e.g., "Coverage grew 3x since analysis")
      - Automatic staleness badge based on source_count_at_extraction vs current count
    not_urgent_because: >
      Most narratives are extracted mid-to-late month when coverage is substantial.
      February is the first month with on-demand extraction. Monitor before solving.
    related_decisions:
      - D-025 (original refresh mode design)
      - D-030 (on-demand extraction replacing daemon)

  - id: Q-002
    date: 2026-02-21
    status: open
    title: No re-extraction path for existing narratives
    context: >
      The extract-narratives API route returns existing narratives if any exist
      (line 32-37 of extraction_api.py). Users cannot trigger re-extraction for
      entities that already have narratives. This means early extractions persist
      even if coverage changed dramatically or extraction quality was poor.
    possible_directions:
      - Add a "Re-extract" button (separate from initial "Extract & Analyse")
      - Allow re-extraction when source count grew by a configurable threshold
      - Version narratives (keep old extraction, create new one alongside)
    not_urgent_because: >
      On-demand extraction is new. Most entities don't have narratives yet.
      The problem will become visible as the month progresses and users revisit
      previously-extracted entities. Monitor usage patterns first.
    related_decisions:
      - D-030 (on-demand extraction)

  - id: Q-003
    date: 2026-03-11
    status: future_goal
    title: "RAI: Temporal depth -- track narrative evolution over time"
    context: >
      Intelligence analysis tracks how narratives EVOLVE over time. When a narrative
      suddenly shifts, that's a signal. Currently RAI analyses a single month's snapshot.
      Temporal depth would compare how the same entity's coverage framing changes across
      months -- detecting narrative shifts, escalation patterns, and opinion convergence
      or divergence over time.
    challenges:
      - Requires multiple months of stance-clustered narratives for the same entity
      - Entity identity across months is tricky (CTMs change, events are ephemeral)
      - Epics are the natural unit for temporal tracking (persistent across months)
      - Need data accumulation before this becomes feasible
    possible_directions:
      - Epic-level narrative timeline (compare extraction results month over month)
      - Narrative shift detection (alert when cluster composition changes significantly)
      - Stance drift tracking (publisher stance scores over time for same centroid)

  - id: Q-004
    date: 2026-03-11
    status: future_goal
    title: "RAI: Structural prediction -- test analytical quality via forecasting"
    context: >
      If the structural analysis is good, it should have predictive power. Given
      mapped power structures, incentive alignments, historical patterns, and
      structural constraints, the system could generate probabilistic assessments
      of likely outcomes -- not prophecy, but the same logic insurance actuaries
      use. Structural conditions predict outcomes better than stated intentions.
    challenges:
      - Requires careful framing to avoid appearing as fortune-telling
      - Predictions must be testable and revisitable (requires tracking mechanism)
      - LLM predictions are educated pattern-matching, not causal models
    possible_directions:
      - "Structural outlook" section in analysis identifying most likely trajectories
      - Revisit mechanism -- compare past structural predictions with actual developments
      - Confidence calibration based on how well-constrained the structural factors are
