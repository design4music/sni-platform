# Strategic Narratives — Actor-bound persistent claims
# v2.1 — US + Russia (EU, CN, ... to follow)
#
# Design principles:
#   - Each narrative is a *specific claim* an actor makes about the world
#   - Generic positions (e.g., "free trade is good") only included if actor-specific framing matters
#   - Signal fields (actor_prefixes, action_classes, domains) enable mechanical matching
#   - category: links to one of 59 types in narrative_taxonomy.yaml (convention, no FK)
#
# US narratives are split into two competing camps:
#   (A) Establishment/globalist — bipartisan foreign policy consensus, stronger among Democrats
#   (B) MAGA/nationalist — America First, anti-globalist, sovereignty-focused
#   Both are "US narratives" but they oppose each other on key axes.


# ===========================================================================
# AMERICAS-US — Establishment / Globalist camp
# ===========================================================================

  # --- Liberal International Order ---

  - id: us_globalist_order
    meta_narrative: liberal_international_order
    category: multilateral_problem_solving
    actor_centroid: AMERICAS-USA
    name: "Multilateral globalization benefits all"
    claim: >
      Global challenges require global governance. International institutions, open
      borders, free trade, and coordinated policy (climate, health, finance) produce
      better outcomes than unilateral action. National sovereignty must sometimes
      yield to collective rules.
    normative_conclusion: "Global cooperation must deepen"
    keywords: [globalism, globalization, multilateral, WEF, Davos, international cooperation, global governance, open borders]
    action_classes: [MULTILATERAL_ACTION, ALLIANCE_COORDINATION, REGULATORY_ACTION]
    actor_prefixes: [US]
    domains: [FOREIGN_POLICY, GOVERNANCE]

  - id: us_rules_based_order
    meta_narrative: liberal_international_order
    category: rules_based_order_enforcement
    actor_centroid: AMERICAS-USA
    name: "Rules-based order must be enforced"
    claim: >
      International rules and norms, largely shaped by Western democracies,
      must be actively enforced to prevent instability and revisionism.
    normative_conclusion: "Violations must be punished"
    keywords: [rules-based order, enforcement, norms, violations, international law]
    action_classes: [SANCTION_ENFORCEMENT, MULTILATERAL_ACTION, LEGAL_ACTION]
    actor_prefixes: [US]
    domains: [FOREIGN_POLICY]

  - id: us_democracy_vs_authoritarianism
    meta_narrative: liberal_international_order
    category: democracy_promotion
    actor_centroid: AMERICAS-USA
    name: "Democracy must prevail over authoritarianism"
    claim: >
      The global struggle between democratic and authoritarian systems defines
      the future of international order and requires active support for democracies.
    normative_conclusion: "Democracies must be supported"
    keywords: [democracy, authoritarianism, freedom, democratic values, free elections]
    action_classes: [PRESSURE, PRESSURE, RESOURCE_ALLOCATION]
    actor_prefixes: [US]

  - id: us_human_rights_enforcement
    meta_narrative: liberal_international_order
    category: human_rights_enforcement
    actor_centroid: AMERICAS-USA
    name: "Human rights violations require international action"
    claim: >
      Systematic human rights violations undermine global legitimacy
      and must be addressed through sanctions, tribunals, and diplomatic pressure.
    normative_conclusion: "Violators must face consequences"
    keywords: [human rights, violations, accountability, sanctions, ICC, genocide]
    action_classes: [LEGAL_ACTION, SANCTION_ENFORCEMENT, PRESSURE]
    actor_prefixes: [US]

  - id: us_sanctions_enforce_norms
    meta_narrative: liberal_international_order
    category: sanctions_regime
    actor_centroid: AMERICAS-USA
    name: "Sanctions enforce international norms"
    claim: >
      Economic sanctions are the primary tool to pressure norm-violating states
