    normative_conclusion: "Sanctions should be applied and tightened"
    keywords: [sanctions, pressure, enforcement, compliance, asset freeze, embargo]
    action_classes: [SANCTION_ENFORCEMENT, ECONOMIC_PRESSURE, PRESSURE]
    actor_prefixes: [US]

  - id: us_nato_collective_defense
    meta_narrative: liberal_international_order
    category: collective_security
    actor_centroid: AMERICAS-USA
    name: "NATO collective defense ensures European security"
    claim: >
      The transatlantic alliance deters aggression and provides collective security;
