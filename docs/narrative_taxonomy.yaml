# WorldBrief Narrative Taxonomy
# Status: Draft v2 (2026-03-17)
#
# Level 1: Meta Narratives (9) - fundamental models of world order
# Level 2: Strategic Narratives (59) - persistent explanatory frameworks (5-20yr lifespan)
# Level 3: Event Narratives - auto-detected (existing stance clustering)
#
# Signal fields reference:
#   actor_prefixes: country codes matching actor field prefixes (e.g., US_ matches US_EXECUTIVE, US_ARMED_FORCES)
#   actor_types: CONTROLLED_ACTORS from core/ontology.py (institution types)
#   action_classes: 23 action classes from ELO v2.0 (T1-T7)
#   domains: 7 domains from ELO v2.0
#   keywords: lexical anchors for narrative detection (matched against tags, signals, titles)


# =============================================================================
# META NARRATIVES (Level 1)
# =============================================================================

meta_narratives:

  - id: liberal_international_order
    name: Liberal International Order
    description: >
      Rules, institutions, and norms -- largely shaped by Western powers --
      are presented as universal and enforced to maintain stability and order.
    signals:
      actor_prefixes: [US, EU, UK, FR, DE]
      actor_types: [IGO, INTERNATIONAL_COURT, STATE_EXECUTIVE]
      action_classes: [MULTILATERAL_ACTION, ALLIANCE_COORDINATION, SANCTION_ENFORCEMENT, LEGAL_RULING]
      domains: [FOREIGN_POLICY, GOVERNANCE]
      keywords: [rules-based order, international law, multilateralism, collective security, democracy, norms, human rights]

  - id: great_power_competition
    name: Great Power Competition
    description: >
      Major powers compete for influence, security, and dominance,
      shaping global alignments and conflicts.
    signals:
      actor_prefixes: [US, CN, RU]
      actor_types: [STATE_EXECUTIVE, ARMED_FORCES, INTELLIGENCE_SERVICE]
      action_classes: [MILITARY_OPERATION, STRATEGIC_REALIGNMENT, CAPABILITY_TRANSFER, ECONOMIC_PRESSURE, DIPLOMATIC_PRESSURE]
      domains: [SECURITY, FOREIGN_POLICY]
      keywords: [rivalry, deterrence, escalation, strategic competition, arms race, containment]

  - id: plural_world_order
    name: Plural (Multipolar) World Order
    description: >
      Multiple legitimate centers of power, values, and systems
      coexist without a single dominant hegemon.
    signals:
      actor_prefixes: [CN, IN, BR, RU, ZA]
      actor_types: [IGO, STATE_EXECUTIVE]
      action_classes: [STRATEGIC_REALIGNMENT, ALLIANCE_COORDINATION, MULTILATERAL_ACTION]
      domains: [FOREIGN_POLICY, ECONOMY]
      keywords: [multipolar, BRICS, global south, strategic autonomy, new world order, non-aligned, de-dollarization]

  - id: sovereign_resistance
    name: Sovereign Resistance
    description: >
      National sovereignty and non-interference are primary principles;
      external influence and imposed norms are resisted.
    signals:
      actor_prefixes: [RU, CN, IR, VE, TR]
      actor_types: [STATE_EXECUTIVE, ARMED_FORCES, POPULATION]
      action_classes: [INSTITUTIONAL_RESISTANCE, POLITICAL_PRESSURE, DIPLOMATIC_PRESSURE, COLLECTIVE_PROTEST]
      domains: [GOVERNANCE, FOREIGN_POLICY]
      keywords: [sovereignty, non-interference, territorial integrity, national interest, autonomy, independence]

  - id: global_justice
    name: Global Justice / Post-Colonial Order
    description: >
      Global inequalities rooted in historical imperialism require
      redistribution, recognition, and systemic reform.
    signals:
      actor_prefixes: [ZA, BR, IN, NG, KE]
      actor_types: [NGO, IGO, POPULATION, POLITICAL_PARTY]
      action_classes: [COLLECTIVE_PROTEST, POLITICAL_PRESSURE, MULTILATERAL_ACTION, RESOURCE_ALLOCATION]
      domains: [SOCIETY, ECONOMY, FOREIGN_POLICY]
      keywords: [colonialism, inequality, global south, justice, reparations, exploitation, development]

  - id: economic_order
    name: Economic Order
    description: >
      Global trade and integration create interdependence; simultaneously,
      economic dependencies create vulnerabilities requiring protection.
    signals:
      actor_prefixes: [US, CN, EU, JP]
      actor_types: [CORPORATION, STATE_EXECUTIVE, CENTRAL_BANK, REGULATORY_AGENCY]
      action_classes: [ECONOMIC_PRESSURE, SANCTION_ENFORCEMENT, RESOURCE_ALLOCATION, REGULATORY_ACTION, ECONOMIC_DISRUPTION]
      domains: [ECONOMY, TECHNOLOGY]
      keywords: [trade, globalization, supply chains, decoupling, tariffs, sanctions, industrial policy, economic security]

  - id: security_order
    name: Security & Conflict Order
    description: >
      Armed conflict, terrorism, and military posture shape regional and
      global security arrangements and humanitarian consequences.
    signals:
      actor_prefixes: [US, RU, IL, UA, IR]
      actor_types: [ARMED_FORCES, ARMED_GROUP, INTELLIGENCE_SERVICE, LAW_ENFORCEMENT]
      action_classes: [MILITARY_OPERATION, SECURITY_INCIDENT, LAW_ENFORCEMENT_OPERATION, CAPABILITY_TRANSFER]
      domains: [SECURITY]
      keywords: [conflict, war, terrorism, defense, military, weapons, nuclear, NATO]

  - id: planetary_governance
    name: Planetary Risk Governance
    description: >
      Global systemic risks (climate, pandemics, AI) require coordinated
      international governance and collective action.
    signals:
      actor_prefixes: [EU, US, CN]
      actor_types: [IGO, NGO, REGULATORY_AGENCY, STATE_EXECUTIVE]
      action_classes: [MULTILATERAL_ACTION, POLICY_CHANGE, REGULATORY_ACTION, INFRASTRUCTURE_DEVELOPMENT]
      domains: [TECHNOLOGY, SOCIETY, ECONOMY]
      keywords: [climate, pandemic, sustainability, energy transition, emissions, AI governance, global risk]

  - id: information_order
    name: Information & Narrative Order
    description: >
      Control of information, media, and narrative shapes political
      legitimacy, public opinion, and geopolitical outcomes.
    signals:
      actor_prefixes: [US, RU, CN]
      actor_types: [MEDIA_OUTLET, STATE_EXECUTIVE, INTELLIGENCE_SERVICE, CORPORATION]
      action_classes: [INFORMATION_INFLUENCE, POLITICAL_PRESSURE, REGULATORY_ACTION]
      domains: [MEDIA, TECHNOLOGY]
      keywords: [disinformation, propaganda, censorship, press freedom, social media, information war, narrative]


